<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
	<meta charset="UTF-8">
	<title>사용자 정보</title>
</head>
<body>
<h3>사용자 정보</h3>

<a th:href="@{/}">메인</a>
<a th:href="@{/user/logout}">로그아웃</a>

<p>
	아이디 : <span>[[${apple.userid}]]</span><br>
	이름 : <span>[[${apple.name}]]</span><br>
	생년월일 : <span sec:authentication="principal.user.birth">생년월일</span><br>
	나이 : <span>[[${apple.age}]]</span><br>
	회원등급 : <span>[[${apple.role}]]</span><br>
	가입일 : <span>[[${apple.rdate}]]</span><br>
</p>
</body>
</html>
