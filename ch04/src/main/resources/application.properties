# 기본설정
spring.application.name=ch04
server.servlet.context-path=/ch04

# DataSource 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# [팁] 재연결 및 타임아웃 방지를 위해 뒤에 파라미터를 추가하면 좋습니다.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/studydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1234

# Mybatis 설정
mybatis.mapper-locations=classpath:mappers/**/*.xml
# [추가] MyBatis가 실행하는 SQL 쿼리 로그를 콘솔에 예쁘게 출력하기 위한 설정
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# loggin setting
logging.level.root=INFO
logging.file.name=logs/ch04.log

# [추가] 내가 작성한 DAO와 Mapper 패키지의 로그 레벨을 DEBUG로 설정 (SQL문 확인용)
logging.level.org.example.ch04=DEBUG